<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Whitelist DistritoSur</title>

<style>

body{
font-family:Arial;
background:url('https://i.imgur.com/HMDQHrV.png') center/cover no-repeat fixed;
color:white;
display:flex;
justify-content:center;
align-items:flex-start;
min-height:100vh;
margin:0;
padding:20px;
}

.box{
background:rgba(0,0,0,0.80);
padding:25px;
border-radius:10px;
width:520px;
max-width:90vw;
font-size:14px;
}

h2{
text-align:center;
margin-top:0;
}

button{
width:100%;
padding:8px;
margin-top:10px;
font-size:14px;
border:none;
background:#22c55e;
color:white;
border-radius:5px;
cursor:pointer;
}

button:hover{
opacity:0.9;
}

.question{
margin-bottom:12px;
}

.question p{
margin:0 0 6px 0;
font-weight:bold;
}

label{
display:block;
margin-bottom:3px;
font-size:13px;
}

</style>

</head>

<body>

<div class="box">

<h2>Whitelist DistritoSur</h2>

<div id="login">
<button onclick="login()">Login con Discord</button>
</div>

<form id="quiz"></form>

<button id="send" onclick="send()" style="display:none">
Enviar respuestas
</button>

<div id="result"></div>

</div>

<script>

function login(){
window.location="/auth/discord"
}

async function check(){

const r = await fetch('/api/user')
const d = await r.json()

if(d.logged){

document.getElementById('login').innerHTML =
`Logueado como ${d.user.username}`

start()

}

}

const questions=[

{q:"¿Qué es PG (PowerGaming)?",a:["Hacer acciones en el juego que en la vida real serian imposibles","Interpretar bien rol","Conducir"],c:0},
{q:"¿Qué es MG (MetaGaming)?",a:["Usar info externa para el beneficio ic","Radio IC","Correr"],c:0},
{q:"IC significa",a:["Dentro del personaje","Fuera del personaje","Administrador"],c:0},
{q:"OOC significa",a:["Fuera del personaje","Dentro del personaje","Policia"],c:0},
{q:"DM es",a:["Matar sin rol previo","Robar banco","Matar con un coche"],c:0},
{q:"VDM es",a:["Atropellar a matar en un rol","Conducir normal","Tirarte de un coche"],c:0},
{q:"CK es",a:["Muerte permanente del personaje","Carcel","Nada"],c:0},
{q:"Si te apuntan con un arma que debes de hacer?",a:["Valorar tu vida y la de terceros","Atacar","hacerte el heroe"],c:0},
{q:"¿Se puede usar info de Discord o streams en rol?",a:["No","Sí","Aveces"],c:0},
{q:"¿Qué es FailRP?",a:["No seguir correctamente el rol","Robar banco","Nada"],c:0}

]

function start(){

const quiz=document.getElementById('quiz')

document.getElementById('send').style.display='block'

questions.forEach((q,i)=>{

let html=`<div class="question"><p>${i+1}. ${q.q}</p>`

q.a.forEach((a,j)=>{

html+=`<label>
<input type="radio" name="q${i}" value="${j}">
${a}
</label>`

})

html+='</div>'

quiz.innerHTML+=html

})

}

async function send(){

let score=0
let wrong=[]

questions.forEach((q,i)=>{

const a=document.querySelector(`input[name=q${i}]:checked`)

if(a && Number(a.value)===q.c)
score++
else
wrong.push(i+1)

})

await fetch('/api/submit',{
method:'POST',
headers:{'Content-Type':'application/json'},
body:JSON.stringify({score,wrong})
})

document.getElementById('quiz').style.display="none"
document.getElementById('send').style.display="none"

document.getElementById('result').innerHTML="✔️ Tu whitelist ha sido enviada al staff."

}

check()

</script>

</body>
</html>
